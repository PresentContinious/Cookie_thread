# Cookie sensor-node firmware: OpenThread + CoAP client + sensor sampling.
#
# Mirrors apps/gateway in NCS-style minimal config. CONFIG_OPENTHREAD=y
# auto-starts the OT stack with the dataset baked in via OPENTHREAD_NETWORK*.
# Profile overlays (overlays/profile_auto.conf, overlays/profile_sed.conf)
# select FTD vs MTD/SED at build time. Board overlays
# (boards/<board>.conf) handle per-board console quirks (Dongle disables
# USB-CDC entirely to avoid the OT-init clash; Cookie uses hardware UART).

# --- Core OpenThread ----------------------------------------------------
CONFIG_OPENTHREAD=y

# Default Thread dataset (one mesh, all nodes match).
CONFIG_OPENTHREAD_NETWORK_NAME="CookieMesh"
CONFIG_OPENTHREAD_NETWORKKEY="00:11:22:33:44:55:66:77:88:99:aa:bb:cc:dd:ee:ff"
CONFIG_OPENTHREAD_PANID=43981
CONFIG_OPENTHREAD_XPANID="de:ad:00:be:ef:00:ca:fe"
CONFIG_OPENTHREAD_CHANNEL=15
CONFIG_OPENTHREAD_DEFAULT_TX_POWER=8

# Settings storage for OT dataset persistence.
CONFIG_PM_PARTITION_SIZE_SETTINGS_STORAGE=0x8000

# --- Zephyr networking (selected explicitly; OPENTHREAD does not pull) -
CONFIG_NETWORKING=y
CONFIG_NET_L2_OPENTHREAD=y
CONFIG_NET_IPV6=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y

# OT-native CoAP client (replaces Zephyr CoAP-over-socket; the socket path
# hangs on OT-backed Zephyr because multicast doesn't surface).
CONFIG_OPENTHREAD_COAP=y

# Net buffer pool sized for sparse sensor traffic + multicast discovery.
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=80
CONFIG_NET_BUF_TX_COUNT=80
CONFIG_NET_TX_STACK_SIZE=2048
CONFIG_NET_RX_STACK_SIZE=2048
CONFIG_NET_MAX_CONTEXTS=10

# Trim mbedtls (we don't use SHA-1).
CONFIG_MBEDTLS_SHA1_C=n

# --- Stack and runtime --------------------------------------------------
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_ENTROPY_GENERATOR=y

# --- Cookie libs --------------------------------------------------------
CONFIG_COOKIE_PROTO=y
CONFIG_COOKIE_SENSORS=y
CONFIG_COOKIE_POWER=y

# --- Sensor stack -------------------------------------------------------
# SHTC3 / ICM-20648 / INA333 wrappers all compile a no-op fallback when
# the matching DT alias / channel is absent (Dongle has none of these).
CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_SHTCX=y
CONFIG_ADC=y

# --- Logging (off in SED via overlay; on otherwise) --------------------
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_PRINTK=y
CONFIG_CBPRINTF_FP_SUPPORT=y
CONFIG_FPU=y
