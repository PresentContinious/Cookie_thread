# --- Base ----------------------------------------------------------------
CONFIG_LOG=y
CONFIG_GPIO=y
CONFIG_PRINTK=y
CONFIG_CBPRINTF_FP_SUPPORT=y
CONFIG_USE_DT_CODE_PARTITION=n

CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=n

# --- Networking + OpenThread --------------------------------------------
CONFIG_NETWORKING=y
CONFIG_NET_L2_OPENTHREAD=y
CONFIG_NET_IPV6=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=80
CONFIG_NET_BUF_TX_COUNT=80
CONFIG_NET_TX_STACK_SIZE=2048
CONFIG_NET_RX_STACK_SIZE=2048
CONFIG_NET_MAX_CONTEXTS=10

CONFIG_OPENTHREAD=y
CONFIG_OPENTHREAD_MANUAL_START=y
CONFIG_OPENTHREAD_LIBRARY=y
CONFIG_OPENTHREAD_THREAD_VERSION_1_4=y
CONFIG_OPENTHREAD_DEFAULT_TX_POWER=8

# --- CoAP ----------------------------------------------------------------
CONFIG_COAP=y

# --- Cookie libs ---------------------------------------------------------
CONFIG_COOKIE_PROTO=y
CONFIG_COOKIE_SENSORS=y

# --- Sensor stack (SHTC3 on Cookie; absent on Dongle, no-op then) -------
CONFIG_SENSOR=y
CONFIG_SHTCX=y

# Profile-specific knobs (FTD vs MTD, PM, log backend) live in
# overlays/profile_auto.conf and overlays/profile_sed.conf.
