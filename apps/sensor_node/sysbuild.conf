SB_CONFIG_BOOTLOADER_MCUBOOT=n

# Disable Partition Manager: it's deprecated in NCS v3.3 and was the actual
# cause of the SYS_INIT crash that killed every OpenThread image on
# nRF52840 Dongle (and made the OT+USB-CDC clash look like the bug).
# Without PM, Zephyr uses the DT-declared partitions, which is exactly
# what we want anyway since we don't compose multiple images.
SB_CONFIG_PARTITION_MANAGER=n
