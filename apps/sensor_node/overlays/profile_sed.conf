# SED profile: MTD-SED, deep sleep between wake cycles, no logging.

CONFIG_NODE_PROFILE_SED=y

CONFIG_OPENTHREAD_FTD=n
CONFIG_OPENTHREAD_MTD=y
CONFIG_OPENTHREAD_MTD_SED=y
CONFIG_OPENTHREAD_NORDIC_LIBRARY_MTD=y
CONFIG_OPENTHREAD_POLL_PERIOD=240000

# --- Power management ----------------------------------------------------
# nRF52840 enters System ON deep sleep via __WFI in the kernel idle thread
# whenever no thread is runnable. CONFIG_PM (system-level) is only available
# on newer Nordic SoCs (nRF54H, nRF92), and not needed here. PM_DEVICE
# enables per-device suspend hooks (I2C bus suspends between transactions).
CONFIG_PM_DEVICE=y

# --- Strip the log backend from the SED build to save UART power. -------
CONFIG_LOG=n
CONFIG_UART_CONSOLE=n
CONFIG_SERIAL=n
CONFIG_CONSOLE=n

# Smaller buffers — SED traffic is sparse.
CONFIG_NET_PKT_RX_COUNT=8
CONFIG_NET_PKT_TX_COUNT=8
CONFIG_NET_BUF_RX_COUNT=40
CONFIG_NET_BUF_TX_COUNT=40
