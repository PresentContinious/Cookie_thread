# Dongle as sensor node. The board's defconfig forces USB-CDC ACM as the
# console, which on this NCS+Zephyr+OpenThread combination clashes with
# OT's SYS_INIT path and prevents the device from booting (verified
# against the upstream nrf/samples/openthread/coap_server golden sample —
# same failure). Workaround: drop the console entirely on this board.
# The sensor-node only needs the radio; debug logs are read from the
# gateway side or via SWD test pads + RTT when truly needed.

CONFIG_INPUT=y

CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_SERIAL=n
CONFIG_USB_DEVICE_STACK_NEXT=n
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=n
CONFIG_LOG=n
