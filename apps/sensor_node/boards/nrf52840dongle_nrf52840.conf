# Dongle as sensor node.
#
# 1) Drop USB-CDC console: this image does not need a host-facing console.
#    The Dongle defconfig forces USB-CDC ACM as the console which would also
#    clash with the OpenThread SYS_INIT chain on this board / NCS combination.
#
# 2) Force LFCLK to the on-board 32.768 kHz crystal. The stock
#    nrf52840dongle defconfig uses the internal RC oscillator (~500 ppm)
#    even though Y2 is populated; OpenThread MAC timing is sensitive to LFCLK
#    accuracy and several reports tie its SYS_INIT panics on Dongle to the
#    RC source. Cookie already runs XTAL.
CONFIG_INPUT=y

CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_SERIAL=n
CONFIG_USB_DEVICE_STACK_NEXT=n
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=n
CONFIG_LOG=n

CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=n
CONFIG_CLOCK_CONTROL_NRF_K32SRC_XTAL=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_20PPM=y
