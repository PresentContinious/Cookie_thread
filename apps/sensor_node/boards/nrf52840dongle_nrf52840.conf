# Dongle as sensor node, with USB-CDC console enabled for debug visibility.
#
# Now that the OT+USB SYS_INIT crash is solved (it was Partition Manager,
# not the USB stack), we can keep the Dongle's default USB-CDC console
# AND enable logging in deferred mode. The node will appear as a USB
# Serial Device on a fresh COM port and can be read alongside the
# gateway.
#
# LFCLK to the on-board 32.768 kHz crystal (matches Cookie).
CONFIG_INPUT=y

CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_PRINTK=y

CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=n
CONFIG_CLOCK_CONTROL_NRF_K32SRC_XTAL=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_20PPM=y
