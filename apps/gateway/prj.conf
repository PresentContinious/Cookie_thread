# Cookie gateway: OpenThread FTD + Zephyr CoAP server + USB-CDC raw passthrough.
#
# Modeled after the NCS-style minimal config that we verified builds and
# enumerates on nrf52840dongle. CONFIG_OPENTHREAD=y pulls in the OT stack;
# Zephyr-side NETWORKING/L2/sockets/CoAP are added because the gateway uses
# Zephyr's <zephyr/net/coap.h> + BSD sockets (not OT's CoAP API). OT defaults
# auto-start; the dataset comes from CONFIG_OPENTHREAD_NETWORK* below.

# Core OpenThread.
CONFIG_OPENTHREAD=y

# Zephyr networking (selected explicitly; CONFIG_OPENTHREAD does not pull these
# transitively).
CONFIG_NETWORKING=y
CONFIG_NET_L2_OPENTHREAD=y
CONFIG_NET_IPV6=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_COAP=y

# Default Thread dataset (baked in; auto-loaded by Zephyr glue at boot).
CONFIG_OPENTHREAD_NETWORK_NAME="CookieMesh"
CONFIG_OPENTHREAD_NETWORKKEY="00:11:22:33:44:55:66:77:88:99:aa:bb:cc:dd:ee:ff"
CONFIG_OPENTHREAD_PANID=43981
CONFIG_OPENTHREAD_XPANID="de:ad:00:be:ef:00:ca:fe"
CONFIG_OPENTHREAD_CHANNEL=25

# Settings storage for OT dataset persistence.
CONFIG_PM_PARTITION_SIZE_SETTINGS_STORAGE=0x8000

# Trim mbedtls (saves ~5 KB; we don't use SHA-1 anywhere).
CONFIG_MBEDTLS_SHA1_C=n

# Console / printk for raw JSON-line emission to USB-CDC.
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_PRINTK=y
CONFIG_GPIO=y
CONFIG_CBPRINTF_FP_SUPPORT=y
CONFIG_FPU=y

# Stack and main thread.
CONFIG_MAIN_STACK_SIZE=4096

# Cookie shared protocol library (frame schema, resource paths).
CONFIG_COOKIE_PROTO=y

# USB-CDC product string for plug-disambiguation.
CONFIG_CDC_ACM_SERIAL_PRODUCT_STRING="Cookie Gateway"
