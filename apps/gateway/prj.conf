# Stub gateway: OpenThread FTD + CoAP server + USB-CDC raw passthrough.
#
# KNOWN ISSUE (2026-05-03): on nRF52840 Dongle this build does not enumerate
# as a USB-CDC ACM device after flashing — the OpenThread SYS_INIT path
# crashes before main() runs, preventing USB enumeration. The minimal
# (no-OpenThread) variant of the same gateway enumerates and prints fine,
# so the boot path / USB stack itself is healthy. Investigation deferred
# until Cookie hardware arrives (TC2050 SWD + RTT will give the OT init
# panic message directly). The four builds are guaranteed to COMPILE
# cleanly with this config; runtime gateway on Dongle is not yet verified.

CONFIG_NETWORKING=y
CONFIG_NET_L2_OPENTHREAD=y
CONFIG_NET_IPV6=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y

CONFIG_OPENTHREAD_FTD=y
CONFIG_OPENTHREAD_LIBRARY=y
CONFIG_OPENTHREAD_NORDIC_LIBRARY_FTD=y
CONFIG_OPENTHREAD_THREAD_VERSION_1_4=y
CONFIG_OPENTHREAD_MANUAL_START=y
CONFIG_OPENTHREAD_COAP=y

CONFIG_COAP=y

CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_GPIO=y
CONFIG_PRINTK=y
CONFIG_CBPRINTF_FP_SUPPORT=y
CONFIG_FPU=y

CONFIG_MAIN_STACK_SIZE=4096
CONFIG_ENTROPY_GENERATOR=y

CONFIG_USE_DT_CODE_PARTITION=n

CONFIG_COOKIE_PROTO=y
