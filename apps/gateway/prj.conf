# Cookie gateway: OpenThread FTD + Zephyr CoAP server + raw passthrough to
# the host console.
#
# Builds on both nrf52840dongle (USB-CDC console) and cookie_nrf_v200
# (hardware UART console). Per-board specifics live in
# boards/<board>.conf. CONFIG_OPENTHREAD=y pulls in the OT stack;
# Zephyr-side NETWORKING/L2/sockets/CoAP are added because the gateway
# uses Zephyr's <zephyr/net/coap.h> + BSD sockets (not OT's CoAP API).
# OT defaults auto-start; the dataset comes from CONFIG_OPENTHREAD_NETWORK*
# below.

# Core OpenThread.
CONFIG_OPENTHREAD=y

# Zephyr networking (selected explicitly; CONFIG_OPENTHREAD does not pull these
# transitively).
CONFIG_NETWORKING=y
CONFIG_NET_L2_OPENTHREAD=y
CONFIG_NET_IPV6=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_COAP=y

# Default Thread dataset (baked in; auto-loaded by Zephyr glue at boot).
CONFIG_OPENTHREAD_NETWORK_NAME="CookieMesh"
CONFIG_OPENTHREAD_NETWORKKEY="00:11:22:33:44:55:66:77:88:99:aa:bb:cc:dd:ee:ff"
CONFIG_OPENTHREAD_PANID=43981
CONFIG_OPENTHREAD_XPANID="de:ad:00:be:ef:00:ca:fe"
CONFIG_OPENTHREAD_CHANNEL=25

# As the headline gateway image we want to bias toward Leader/Router; bump the
# Router upgrade threshold so an early-booted Cookie gateway snaps up the
# Leader role rather than hanging at REED.
CONFIG_OPENTHREAD_MAX_CHILDREN=10

# Settings storage for OT dataset persistence.
CONFIG_PM_PARTITION_SIZE_SETTINGS_STORAGE=0x8000

# Trim mbedtls (saves ~5 KB; we don't use SHA-1 anywhere).
CONFIG_MBEDTLS_SHA1_C=n

# Console / printk for raw JSON-line emission.
# LOG_MODE_DEFERRED so the log subsystem doesn't block USB enumeration in
# SYS_INIT (CONFIG_LOG_MODE_IMMEDIATE was the candidate cause of the
# Dongle-gateway USB hang seen on 2026-05-10).
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_PRINTK=y
CONFIG_GPIO=y
CONFIG_CBPRINTF_FP_SUPPORT=y
CONFIG_FPU=y

# Thread-side info logs for visibility into role transitions and child events.
CONFIG_OPENTHREAD_LOG_LEVEL_INFO=y
CONFIG_OPENTHREAD_DEBUG=y

# Stack and main thread.
CONFIG_MAIN_STACK_SIZE=4096

# Cookie shared protocol library (frame schema, resource paths).
CONFIG_COOKIE_PROTO=y
