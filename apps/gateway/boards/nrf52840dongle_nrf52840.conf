# Dongle as gateway. Defconfig auto-enables USB CDC ACM as the console;
# the gateway emits its JSON-line stream there via printk (see usb_print.c).
# The product-string override below is what shows up in Device Manager
# / `lsusb -v`, so the user can tell the Cookie gateway apart from a
# vanilla Dongle on a multi-port hub.
CONFIG_CDC_ACM_SERIAL_PRODUCT_STRING="Cookie Gateway"
