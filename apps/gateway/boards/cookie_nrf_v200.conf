# Cookie nRF V2.00 as gateway / Leader.
#
# Console is the on-board hardware UART (set as zephyr,console in the
# board DTS chosen{}). No USB stack is brought up; the PC tool reads the
# JSON-line stream over UART through whatever USB-to-serial bridge sits
# next to the board (or through the SWD probe's VCOM if J-Link is used).
#
# All Cookie defconfig settings (GPIO, SERIAL, CONSOLE, UART_CONSOLE,
# clocks, MPU, hardware stack protection) are sufficient. Sensor stack is
# explicitly disabled here because the gateway image does not need it.
CONFIG_SENSOR=n
CONFIG_I2C=n
CONFIG_ADC=n
CONFIG_INPUT=n
