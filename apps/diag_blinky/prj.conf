# Diagnostic blinky — no networking, no USB, no OpenThread.
# If this image blinks LEDs and the sensor_node image does not, the crash is
# inside the OpenThread / networking SYS_INIT chain (not flash layout, not
# bsp_init, not the toolchain).
CONFIG_GPIO=y
CONFIG_PRINTK=n
CONFIG_LOG=n
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_SERIAL=n
CONFIG_USB_DEVICE_STACK=n
CONFIG_USB_DEVICE_STACK_NEXT=n
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=n
