# SYS_INIT-stage tracer with OpenThread linked in. The visible pulse pattern
# tells us how far Zephyr init progresses before crashing.
#
# Stages:
#   1. PRE_KERNEL_1    -> green flash    200 ms
#   2. PRE_KERNEL_2    -> red flash      200 ms
#   3. POST_KERNEL     -> both flash     200 ms
#   4. APPLICATION     -> alternating fast 200 ms
#   5. main()          -> both solid     1000 ms, then 4 Hz strobe forever
#
# Reading: count visible pulses then map to the deepest stage reached.

CONFIG_GPIO=y
CONFIG_PRINTK=n
CONFIG_LOG=n
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_SERIAL=n
CONFIG_USB_DEVICE_STACK=n
CONFIG_USB_DEVICE_STACK_NEXT=n
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=n

CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=n
CONFIG_CLOCK_CONTROL_NRF_K32SRC_XTAL=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_20PPM=y

# OpenThread linked in to reproduce the SYS_INIT crash.
CONFIG_OPENTHREAD=y
CONFIG_NETWORKING=y
CONFIG_NET_L2_OPENTHREAD=y
CONFIG_NET_IPV6=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_OPENTHREAD_MANUAL_START=y

CONFIG_MAIN_STACK_SIZE=4096
CONFIG_ENTROPY_GENERATOR=y
CONFIG_MBEDTLS_SHA1_C=n
